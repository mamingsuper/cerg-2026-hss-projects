  <body>
    <main class="app-shell">
      <section class="hero">
        <div>
          <p class="eyebrow">RGC CERG / GRF 2026-27</p>
          <h1>General Research Fund Project Finder</h1>
          <p class="hero-copy">
            1493 个 2026/27 年度新获批项目，按官网 Panel、Subject Area、院校、PI、关键词和资助金额快速检索。
          </p>
          <a class="download-link" href="cerg_2026_all_subjects_projects.xlsx">
            Download Excel dataset
          </a>
        </div>
        <div class="hero-stats" aria-label="dataset summary">
          <div>
            <strong id="stat-projects">...</strong>
            <span>projects</span>
          </div>
          <div>
            <strong id="stat-subjects">...</strong>
            <span>subject areas</span>
          </div>
          <div>
            <strong id="stat-funding">...</strong>
            <span>shown funding</span>
          </div>
        </div>
      </section>

      <section class="controls" aria-label="project filters">
        <label class="search-box">
          <span>Search</span>
          <input id="query" placeholder="题名、PI、院校、关键词、项目编号" />
        </label>
        <label>
          <span>Panel</span>
          <select id="panel"></select>
        </label>
        <label>
          <span>Subject</span>
          <select id="subject"></select>
        </label>
        <label>
          <span>Institution</span>
          <select id="institution"></select>
        </label>
        <label>
          <span>Status</span>
          <select id="status"></select>
        </label>
        <label>
          <span>Sort</span>
          <select id="sort">
            <option value="number">Project number</option>
            <option value="fund-desc">Funding high to low</option>
            <option value="fund-asc">Funding low to high</option>
            <option value="title">Title A-Z</option>
          </select>
        </label>
        <button class="reset-button" id="reset" type="button">Reset</button>
      </section>

      <section class="workspace">
        <aside class="subject-rail" aria-label="official panel counts">
          <p class="rail-title">Official panels</p>
          <div id="subject-rail"></div>
        </aside>

        <section class="results" aria-label="project results">
          <div class="results-header">
            <div>
              <p><span id="result-count">0</span> results</p>
              <h2 id="result-title">All 2026 projects</h2>
            </div>
            <span id="result-funding">...</span>
          </div>
          <div class="project-list" id="project-list"></div>
        </section>

        <aside class="detail-pane" aria-label="selected project details" id="detail-pane">
          <div class="empty-state">
            <h3>Loading projects</h3>
            <p>项目详情会显示在这里。</p>
          </div>
        </aside>
      </section>
    </main>

    <script>
      const ALL = "全部";
      const DATA_VERSION = "20260627-fix-json";
      let projects = [];
      let filtered = [];
      let selectedNumber = null;
      let showAbstract = false;

      const state = {
        query: "",
        panel: ALL,
        subject: ALL,
        institution: ALL,
        status: ALL,
        sort: "number",
      };

      const el = {
        query: document.getElementById("query"),
        panel: document.getElementById("panel"),
        subject: document.getElementById("subject"),
        institution: document.getElementById("institution"),
        status: document.getElementById("status"),
        sort: document.getElementById("sort"),
        reset: document.getElementById("reset"),
        statProjects: document.getElementById("stat-projects"),
        statSubjects: document.getElementById("stat-subjects"),
        statFunding: document.getElementById("stat-funding"),
        subjectRail: document.getElementById("subject-rail"),
        resultCount: document.getElementById("result-count"),
        resultTitle: document.getElementById("result-title"),
        resultFunding: document.getElementById("result-funding"),
        projectList: document.getElementById("project-list"),
        detailPane: document.getElementById("detail-pane"),
      };

      function uniqueValues(key) {
        return [...new Set(projects.map((project) => String(project[key] || "").trim()))]
          .filter(Boolean)
          .sort((a, b) => a.localeCompare(b));
      }

      function money(value) {
        return value ? `HK$${value.toLocaleString("en-US")}` : "未列明";
      }

      function normalize(value) {
        return String(value || "").toLocaleLowerCase().replace(/\s+/g, " ").trim();
      }

      function searchText(project) {
        return normalize(
          [
            project.projectNumber,
            project.titleEnglish,
            project.titleChinese,
            project.principalInvestigatorEnglish,
            project.principalInvestigatorChinese,
            project.department,
            project.institution,
            project.coInvestigators,
            project.subjectArea,
            project.abstract,
          ].join(" "),
        );
      }

      function setOptions(select, values) {
        select.innerHTML = [ALL, ...values]
          .map((value) => `<option value="${escapeHtml(value)}">${escapeHtml(value)}</option>`)
          .join("");
      }

      function escapeHtml(value) {
        return String(value || "")
          .replaceAll("&", "&amp;")
          .replaceAll("<", "&lt;")
          .replaceAll(">", "&gt;")
          .replaceAll('"', "&quot;")
          .replaceAll("'", "&#039;");
      }

      function applyFilters() {
        const terms = normalize(state.query).split(" ").filter(Boolean);
        filtered = projects.filter((project) => {
          if (state.panel !== ALL && project.panel !== state.panel) return false;
          if (state.subject !== ALL && project.subjectArea !== state.subject) return false;
          if (state.institution !== ALL && project.institution !== state.institution) return false;
          if (state.status !== ALL && project.projectStatus !== state.status) return false;
          if (!terms.length) return true;
          const haystack = searchText(project);
          return terms.every((term) => haystack.includes(term));
        });

        filtered.sort((a, b) => {
          if (state.sort === "fund-desc") {
            return (b.fundApprovedNumber || 0) - (a.fundApprovedNumber || 0);
          }
          if (state.sort === "fund-asc") {
            return (a.fundApprovedNumber || 0) - (b.fundApprovedNumber || 0);
          }
          if (state.sort === "title") {
            return String(a.titleEnglish).localeCompare(String(b.titleEnglish));
          }
          return String(a.projectNumber).localeCompare(String(b.projectNumber));
        });

        if (!filtered.some((project) => project.projectNumber === selectedNumber)) {
          selectedNumber = filtered[0]?.projectNumber || null;
          showAbstract = false;
        }
      }

      function totalFunding(rows) {
        return rows.reduce((sum, project) => sum + (project.fundApprovedNumber || 0), 0);
      }

      function renderStats() {
        const subjects = uniqueValues("subjectArea");
        el.statProjects.textContent = projects.length;
        el.statSubjects.textContent = subjects.length;
        el.statFunding.textContent = money(totalFunding(filtered));
      }

      function renderRail() {
        const panels = uniqueValues("panel").map((name) => ({
          name,
          count: projects.filter((project) => project.panel === name).length,
        }));

        el.subjectRail.innerHTML = panels
          .map(
            (item) => `
              <button class="rail-item ${state.panel === item.name ? "active" : ""}" data-panel="${escapeHtml(item.name)}" type="button">
                <span>${escapeHtml(item.name)}</span>
                <strong>${item.count}</strong>
              </button>
            `,
          )
          .join("");

        el.subjectRail.querySelectorAll("button").forEach((button) => {
          button.addEventListener("click", () => {
            const value = button.dataset.panel;
            state.panel = state.panel === value ? ALL : value;
            el.panel.value = state.panel;
            update();
          });
        });
      }

      function renderResults() {
        el.resultCount.textContent = filtered.length;
        el.resultTitle.textContent = state.panel === ALL ? "All 2026 projects" : state.panel;
        el.resultFunding.textContent = money(totalFunding(filtered));

        if (!filtered.length) {
          el.projectList.innerHTML = `
            <div class="empty-state">
              <h3>No matching projects</h3>
              <p>换一个关键词，或重置筛选条件。</p>
            </div>
          `;
          return;
        }

        el.projectList.innerHTML = filtered
          .map(
            (project) => `
              <button class="project-row ${selectedNumber === project.projectNumber ? "selected" : ""}" data-project="${escapeHtml(project.projectNumber)}" type="button">
                <span class="project-number">${escapeHtml(project.projectNumber)}</span>
                <span class="project-main">
                  <strong>${escapeHtml(project.titleEnglish || project.titleChinese)}</strong>
                  <small>${escapeHtml(project.principalInvestigatorEnglish)} · ${escapeHtml(project.institution)}</small>
                </span>
                <span class="project-meta">
                  <em>${escapeHtml(project.subjectArea)}</em>
                  <b>${money(project.fundApprovedNumber)}</b>
                </span>
              </button>
            `,
          )
          .join("");

        el.projectList.querySelectorAll("button").forEach((button) => {
          button.addEventListener("click", () => {
            selectedNumber = button.dataset.project;
            showAbstract = false;
            renderResults();
            renderDetail();
          });
        });
      }

      function renderDetail() {
        const selected =
          filtered.find((project) => project.projectNumber === selectedNumber) || filtered[0];

        if (!selected) {
          el.detailPane.innerHTML = `
            <div class="empty-state">
              <h3>Select a project</h3>
              <p>项目详情会显示在这里。</p>
            </div>
          `;
          return;
        }

        el.detailPane.innerHTML = `
          <div class="detail-topline">
            <span>${escapeHtml(selected.projectNumber)}</span>
            <span>${escapeHtml(selected.projectStatus)}</span>
          </div>
          <h2>${escapeHtml(selected.titleEnglish || selected.titleChinese)}</h2>
          ${
            selected.titleChinese && selected.titleChinese !== selected.titleEnglish
              ? `<p class="chinese-title">${escapeHtml(selected.titleChinese)}</p>`
              : ""
          }
          <dl class="detail-grid">
            <div><dt>PI</dt><dd>${escapeHtml(selected.principalInvestigatorEnglish || "未列明")}</dd></div>
            <div><dt>Institution</dt><dd>${escapeHtml(selected.institution || "未列明")}</dd></div>
            <div><dt>Department</dt><dd>${escapeHtml(selected.department || "未列明")}</dd></div>
            <div><dt>Panel</dt><dd>${escapeHtml(selected.panel || "未列明")}</dd></div>
            <div><dt>Subject</dt><dd>${escapeHtml(selected.subjectArea || "未列明")}</dd></div>
            <div><dt>Funding</dt><dd>${money(selected.fundApprovedNumber)}</dd></div>
            <div><dt>Exercise year</dt><dd>${escapeHtml(selected.exerciseYear || "2026 / 27")}</dd></div>
          </dl>
          ${
            selected.coInvestigators
              ? `<section class="text-block"><h3>Co-investigators</h3><p>${escapeHtml(selected.coInvestigators)}</p></section>`
              : ""
          }
          <section class="text-block">
            <button class="abstract-toggle" id="abstract-toggle" type="button">
              ${showAbstract ? "Hide abstract" : "Show abstract"}
            </button>
            ${
              showAbstract
                ? `<p class="abstract-text">${escapeHtml(selected.abstract || "No abstract available.")}</p>`
                : ""
            }
          </section>
          <a class="source-link" href="${escapeHtml(selected.sourceUrl)}" target="_blank" rel="noreferrer">
            Open RGC detail page
          </a>
        `;

        document.getElementById("abstract-toggle").addEventListener("click", () => {
          showAbstract = !showAbstract;
          renderDetail();
        });
      }

      function update() {
        applyFilters();
        renderStats();
        renderRail();
        renderResults();
        renderDetail();
      }

      function bindControls() {
        el.query.addEventListener("input", (event) => {
          state.query = event.target.value;
          update();
        });
        el.panel.addEventListener("change", (event) => {
          state.panel = event.target.value;
          update();
        });
        el.subject.addEventListener("change", (event) => {
          state.subject = event.target.value;
          update();
        });
        el.institution.addEventListener("change", (event) => {
          state.institution = event.target.value;
          update();
        });
        el.status.addEventListener("change", (event) => {
          state.status = event.target.value;
          update();
        });
        el.sort.addEventListener("change", (event) => {
          state.sort = event.target.value;
          update();
        });
        el.reset.addEventListener("click", () => {
          state.query = "";
          state.panel = ALL;
          state.subject = ALL;
          state.institution = ALL;
          state.status = ALL;
          state.sort = "number";
          el.query.value = "";
          el.panel.value = ALL;
          el.subject.value = ALL;
          el.institution.value = ALL;
          el.status.value = ALL;
          el.sort.value = "number";
          update();
        });
      }

      async function loadProjects() {
        const sources = [
          "projects.json",
          "https://mamingsuper.github.io/cerg-2026-hss-projects/projects.json",
          "https://raw.githubusercontent.com/mamingsuper/cerg-2026-hss-projects/main/docs/projects.json",
        ];

        let lastError;
        for (const source of sources) {
          try {
            const url = `${source}${source.includes("?") ? "&" : "?"}v=${DATA_VERSION}`;
            const response = await fetch(url, { cache: "no-store" });
            if (!response.ok) {
              throw new Error(`${response.status} ${response.statusText}`);
            }
            return await response.json();
          } catch (error) {
            lastError = error;
          }
        }
        throw lastError || new Error("projects.json unavailable");
      }

      async function init() {
        projects = await loadProjects();
        selectedNumber = projects[0]?.projectNumber || null;
        setOptions(el.panel, uniqueValues("panel"));
        setOptions(el.subject, uniqueValues("subjectArea"));
        setOptions(el.institution, uniqueValues("institution"));
        setOptions(el.status, uniqueValues("projectStatus"));
        bindControls();
        update();
      }

      init().catch((error) => {
        console.error(error);
        el.detailPane.innerHTML = `
          <div class="empty-state">
            <h3>Could not load data</h3>
            <p>请刷新页面再试。</p>
          </div>
        `;
      });
    </script>
  </body>
</html>
